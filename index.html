<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KT Nasmedia SDK Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="KT Nasmedia NAP SSP SDK · NAP Tracking SDK 공식 연동 가이드">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Docsify 기본 테마 (레이아웃 기반) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <style>
    /* ── 브랜드/색상 변수 ── */
    :root {
      --theme-color: #E42429;
      --base-font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.8;
      --base-color: #1f2328;

      /* 사이드바 */
      --sidebar-width: 270px;
      --sidebar-background: #ffffff;
      --sidebar-border-color: #e8eaed;
      --sidebar-border-width: 0 1px 0 0;
      --sidebar-nav-link-color: #444c56;
      --sidebar-nav-link-color--active: #E42429;
      --sidebar-nav-link-background-color--active: #fff0f0;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-link-border-color--active: #E42429;
      --sidebar-nav-link-border-width--active: 0 0 0 3px;
      --sidebar-nav-link-padding: 6px 16px;
      --sidebar-nav-link-font-size: 13.5px;

      /* 콘텐츠 */
      --content-max-width: 820px;
      --base-background-color: #fff;

      /* 코드 */
      --code-font-family: 'JetBrains Mono', monospace;
      --code-font-size: 13px;
      --code-theme-background: #161b22;
      --code-theme-text: #e6edf3;
      --code-inline-background: #f6f8fa;
      --code-inline-color: #c7254e;
      --code-inline-border-radius: 4px;

      /* 제목 */
      --heading-color: #1f2328;
      --heading-h1-font-size: 1.85rem;
      --heading-h1-font-weight: 700;
      --heading-h1-border-width: 0 0 2px;
      --heading-h1-border-color: #E42429;
      --heading-h2-font-size: 1.25rem;
      --heading-h2-font-weight: 600;
      --heading-h2-border-color: #e8eaed;

      /* 테이블 */
      --table-cell-padding: 9px 14px;
      --table-head-background: #f6f8fa;
      --table-head-font-size: 11.5px;
      --table-head-font-weight: 700;
      --table-head-color: #656d76;
      --table-row-even-background: transparent;
      --table-row-odd-background: transparent;

      /* 링크 */
      --link-color: #1a73e8;

      /* blockquote */
      --blockquote-background: #f0f6ff;
      --blockquote-border-color: #1a73e8;
      --blockquote-color: #0969da;
      --blockquote-font-size: 14px;
    }

    /* ── 사이드바 추가 스타일 ── */
    .sidebar-nav > ul > li > p,
    .sidebar-nav > ul > li > strong {
      font-size: 11px !important;
      font-weight: 700 !important;
      letter-spacing: .7px !important;
      text-transform: uppercase !important;
      color: #8c959f !important;
      padding: 18px 16px 4px !important;
      margin: 0 !important;
      display: block;
    }

    .sidebar-nav a {
      border-radius: 6px !important;
      margin: 1px 8px !important;
      transition: background .1s, color .1s !important;
    }

    .sidebar-nav ul ul a { padding-left: 28px !important; font-size: 13px !important; }
    .sidebar-nav ul ul ul a { padding-left: 40px !important; font-size: 12.5px !important; color: #8c959f !important; }

    /* ── 코드 블록 ── */
    .markdown-section pre {
      border-radius: 10px !important;
      border: 1px solid #30363d !important;
    }

    /* ── 테이블 ── */
    .markdown-section table {
      border: 1px solid #e8eaed;
      border-radius: 8px;
      overflow: hidden;
    }
    .markdown-section th { letter-spacing: .4px; }
    .markdown-section td { border-bottom: 1px solid #f0f2f4; }
    .markdown-section tr:last-child td { border-bottom: none; }
    .markdown-section tr:hover td { background: #fafbfc !important; }

    /* ── 검색창 ── */
    .search { padding: 10px 12px 8px; border-bottom: 1px solid #e8eaed; }
    .search input {
      border-radius: 6px !important;
      border: 1px solid #d8dee4 !important;
      font-family: 'Noto Sans KR', sans-serif !important;
      font-size: 13px !important;
    }
    .search input:focus { border-color: #E42429 !important; box-shadow: 0 0 0 3px rgba(228,36,41,.12) !important; }

    /* ── 복사 버튼 ── */
    .docsify-copy-code-button {
      background: #21262d !important;
      color: #8b949e !important;
      border: 1px solid #30363d !important;
      border-radius: 5px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 11px !important;
      top: 10px !important;
      right: 10px !important;
    }
    .docsify-copy-code-button:hover { color: #e6edf3 !important; }

    /* ── 페이지네이션 ── */
    .pagination-item-label { color: #E42429 !important; }
    .pagination-item a:hover { border-color: #E42429 !important; }

    /* ── 사이드바 브랜드 헤더 영역 ── */
    .kt-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 56px;
      border-bottom: 1px solid #e8eaed;
      background: #fff;
      flex-shrink: 0;
    }
    .kt-brand-icon {
      width: 30px; height: 30px;
      background: #E42429;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .kt-brand-name { font-size: 13.5px; font-weight: 700; color: #1f2328; line-height: 1.2; }
    .kt-brand-sub  { font-size: 10.5px; color: #8c959f; letter-spacing: .3px; }

    /* sidebar flex 레이아웃 — 브랜드 상단 고정 */
    .sidebar {
      display: flex !important;
      flex-direction: column !important;
      padding-top: 0 !important;
    }
    .sidebar .search { order: 2; }
    .sidebar .sidebar-nav { order: 3; }

    /* hr in sidebar */
    .sidebar-nav hr { border: none; border-top: 1px solid #e8eaed; margin: 6px 16px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '문서 검색...',
        noData: '검색 결과 없음',
        depth: 6,
      },
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      copyCode: { buttonText: '복사', errorText: '오류', successText: '완료 ✓' },
      pagination: {
        previousText: '← 이전',
        nextText: '다음 →',
        crossChapter: true,
        crossChapterText: true,
      },
    }
  </script>

  <!-- Docsify 코어 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 플러그인 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- 언어 하이라이팅 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-kotlin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-ruby.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>

  <!-- 브랜드 헤더 주입 -->
  <script>
    (function () {
      const brand = document.createElement('div');
      brand.className = 'kt-brand';
      brand.innerHTML = `
        <div class="kt-brand-icon">📡</div>
        <div>
          <div class="kt-brand-name">KT Nasmedia</div>
          <div class="kt-brand-sub">SDK Docs</div>
        </div>`;

      const obs = new MutationObserver(function () {
        const sb = document.querySelector('.sidebar');
        if (sb && !sb.querySelector('.kt-brand')) {
          sb.insertBefore(brand, sb.firstChild);
        }
      });
      obs.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
