<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>kt nasmedia SDK Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="kt nasmedia nap mx sdk · nap tracking sdk 공식 연동 가이드">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Docsify 기본 테마 (레이아웃 기반) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <style>
    /* ── 브랜드/색상 변수 ── */
    :root {
      --theme-color: #E42429;
      --base-font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.8;
      --base-color: #1f2328;

      /* 사이드바 */
      --sidebar-width: 285px;
      --sidebar-background: #ffffff;
      --sidebar-border-color: #e8eaed;
      --sidebar-border-width: 0 1px 0 0;
      --sidebar-nav-link-color: #444c56;
      --sidebar-nav-link-color--active: #E42429;
      --sidebar-nav-link-background-color--active: #fff0f0;
      --sidebar-nav-link-font-weight--active: 600;
      --sidebar-nav-link-border-color--active: #E42429;
      --sidebar-nav-link-border-width--active: 0 0 0 3px;
      --sidebar-nav-link-padding: 6px 16px;
      --sidebar-nav-link-font-size: 13.5px;

      /* 콘텐츠 */
      --content-max-width: 820px;
      --base-background-color: #fff;

      /* 코드 */
      --code-font-family: 'JetBrains Mono', monospace;
      --code-font-size: 13px;
      --code-theme-background: #161b22;
      --code-theme-text: #e6edf3;
      --code-inline-background: #f6f8fa;
      --code-inline-color: #c7254e;
      --code-inline-border-radius: 4px;

      /* 제목 */
      --heading-color: #1f2328;
      --heading-h1-font-size: 1.85rem;
      --heading-h1-font-weight: 700;
      --heading-h1-border-width: 0 0 2px;
      --heading-h1-border-color: #E42429;
      --heading-h2-font-size: 1.25rem;
      --heading-h2-font-weight: 600;
      --heading-h2-border-color: #e8eaed;

      /* 테이블 */
      --table-cell-padding: 9px 14px;
      --table-head-background: #f6f8fa;
      --table-head-font-size: 11.5px;
      --table-head-font-weight: 700;
      --table-head-color: #656d76;
      --table-row-even-background: transparent;
      --table-row-odd-background: transparent;

      /* 링크 */
      --link-color: #1a73e8;

      /* blockquote */
      --blockquote-background: #f0f6ff;
      --blockquote-border-color: #1a73e8;
      --blockquote-color: #0969da;
      --blockquote-font-size: 14px;
    }

    /* ── 사이드바 추가 스타일 ── */

    /* 최상위 카테고리 레이블 (시작하기, 지원) */
    .sidebar-nav > ul > li > p,
    .sidebar-nav > ul > li > strong {
      font-size: 10.5px !important;
      font-weight: 700 !important;
      letter-spacing: .8px !important;
      text-transform: uppercase !important;
      color: #adb5bd !important;
      padding: 20px 16px 5px !important;
      margin: 0 !important;
      display: block;
    }

    /* 모든 링크 공통 */
    .sidebar-nav a {
      border-radius: 6px !important;
      margin: 1px 8px !important;
      transition: background .15s, color .15s !important;
      color: #3d444d !important;
      font-size: 13.5px !important;
      line-height: 1.5 !important;
    }
    .sidebar-nav a:hover {
      background: #f3f4f6 !important;
      color: #1f2328 !important;
    }

    /* 2단계 링크: 개요 등 SDK 섹션 바로 아래 */
    .sidebar-nav ul ul a {
      padding-left: 20px !important;
      font-size: 13.5px !important;
      color: #3d444d !important;
    }

    /* 3단계 링크: 배너 광고 / 시작하기 등 실제 페이지 */
    .sidebar-nav ul ul ul a {
      padding-left: 32px !important;
      font-size: 13px !important;
      color: #57606a !important;
    }
    .sidebar-nav ul ul ul a:hover {
      color: #1f2328 !important;
      background: #f3f4f6 !important;
    }

    /* 플랫폼 서브헤더 (🤖 Android, 🍎 iOS, ⚛️ React Native 등) */
    .sidebar-nav ul ul li > p,
    .sidebar-nav ul ul li > strong {
      font-size: 12px !important;
      font-weight: 700 !important;
      letter-spacing: .2px !important;
      color: #1f2328 !important;
      padding: 14px 16px 4px 20px !important;
      margin: 0 !important;
      display: block !important;
      text-transform: none !important;
      border-top: 1px solid #f0f2f4 !important;
    }
    /* 섹션 첫 번째 플랫폼 헤더는 구분선 제거 */
    .sidebar-nav ul ul li:first-child > p,
    .sidebar-nav ul ul li:first-child > strong {
      border-top: none !important;
      padding-top: 6px !important;
    }

    /* ── 코드 블록 ── */
    .markdown-section pre {
      border-radius: 10px !important;
      border: 1px solid #30363d !important;
    }

    /* ── 테이블 ── */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid #e8eaed;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .markdown-section table {
      border: none !important;
      border-radius: 0 !important;
      overflow: visible !important;
      margin: 0 !important;
      min-width: 100%;
    }
    .markdown-section th { letter-spacing: .4px; }
    .markdown-section td { border-bottom: 1px solid #f0f2f4; }
    .markdown-section tr:last-child td { border-bottom: none; }
    .markdown-section tr:hover td { background: #fafbfc !important; }
    /* 날짜·버전·코드·짧은 값 셀은 줄바꿈 방지 */
    .markdown-section td:first-child,
    .markdown-section th:first-child,
    .markdown-section td:nth-child(2),
    .markdown-section th:nth-child(2) { white-space: nowrap; }

    /* ── 검색창 ── */
    .search { padding: 10px 12px 8px; border-bottom: 1px solid #e8eaed; }
    .search input {
      border-radius: 6px !important;
      border: 1px solid #d8dee4 !important;
      font-family: 'Noto Sans KR', sans-serif !important;
      font-size: 13px !important;
    }
    .search input:focus { border-color: #E42429 !important; box-shadow: 0 0 0 3px rgba(228,36,41,.12) !important; }

    /* ── 복사 버튼 ── */
    .docsify-copy-code-button {
      background: #21262d !important;
      color: #8b949e !important;
      border: 1px solid #30363d !important;
      border-radius: 5px !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 11px !important;
      top: 10px !important;
      right: 10px !important;
    }
    .docsify-copy-code-button:hover { color: #e6edf3 !important; }

    /* ── 페이지네이션 ── */
    .pagination-item-label { color: #E42429 !important; }
    .pagination-item a:hover { border-color: #E42429 !important; }

    /* ── 사이드바 브랜드 헤더 영역 ── */
    .kt-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 56px;
      border-bottom: 1px solid #e8eaed;
      background: #fff;
      flex-shrink: 0;
    }
    .kt-brand-icon {
      width: 30px; height: 30px;
      background: #E42429;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .kt-brand-name { font-size: 13.5px; font-weight: 700; color: #1f2328; line-height: 1.2; }
    .kt-brand-sub  { font-size: 10.5px; color: #8c959f; letter-spacing: .3px; }

    /* sidebar flex 레이아웃 — 브랜드 상단 고정 */
    .sidebar {
      display: flex !important;
      flex-direction: column !important;
      padding-top: 0 !important;
    }
    .sidebar .search { order: 2; }
    .sidebar .sidebar-nav { order: 3; }

    /* hr in sidebar */
    .sidebar-nav hr { border: none; border-top: 1px solid #e8eaed; margin: 6px 16px; }

    /* ── SDK 섹션 구분 — NAP MX SDK (빨강) ── */
    .sdk-mx {
      background: linear-gradient(135deg, rgba(228,36,41,0.06) 0%, rgba(228,36,41,0.02) 100%) !important;
      border-left: 4px solid #E42429 !important;
      border-radius: 0 8px 8px 0 !important;
      margin: 2px 6px 2px 0 !important;
      padding-bottom: 4px !important;
    }
    .sdk-mx > p,
    .sdk-mx > strong {
      background: #E42429 !important;
      color: #ffffff !important;
      border-radius: 0 6px 6px 0 !important;
      padding: 6px 14px 6px 12px !important;
      margin: 0 0 4px -1px !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      letter-spacing: .3px !important;
      text-transform: none !important;
      display: block !important;
    }

    /* ── SDK 섹션 구분 — NAP Tracking SDK (파랑) ── */
    .sdk-tracking {
      background: linear-gradient(135deg, rgba(3,105,161,0.06) 0%, rgba(3,105,161,0.02) 100%) !important;
      border-left: 4px solid #0369a1 !important;
      border-radius: 0 8px 8px 0 !important;
      margin: 2px 6px 2px 0 !important;
      padding-bottom: 4px !important;
    }
    .sdk-tracking > p,
    .sdk-tracking > strong {
      background: #0369a1 !important;
      color: #ffffff !important;
      border-radius: 0 6px 6px 0 !important;
      padding: 6px 14px 6px 12px !important;
      margin: 0 0 4px -1px !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      letter-spacing: .3px !important;
      text-transform: none !important;
      display: block !important;
    }

    /* Tracking 섹션 active 링크 파랑 계열 */
    .sdk-tracking li.active > a {
      color: #0369a1 !important;
      background: #e0f2fe !important;
      border-left-color: #0369a1 !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '문서 검색...',
        noData: '검색 결과 없음',
        depth: 6,
      },
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      plugins: [
        function(hook) {
          hook.doneEach(function() {
            document.querySelectorAll('.markdown-section table').forEach(function(table) {
              if (table.parentNode.classList.contains('table-wrap')) return;
              var wrap = document.createElement('div');
              wrap.className = 'table-wrap';
              table.parentNode.insertBefore(wrap, table);
              wrap.appendChild(table);
            });
          });
        }
      ],
      copyCode: { buttonText: '복사', errorText: '오류', successText: '완료 ✓' },
      pagination: {
        previousText: '← 이전',
        nextText: '다음 →',
        crossChapter: true,
        crossChapterText: true,
      },
    }
  </script>

  <!-- Docsify 코어 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 플러그인 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- 언어 하이라이팅 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-kotlin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-ruby.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>

  <!-- 브랜드 헤더 + SDK 섹션 구분 클래스 주입 -->
  <script>
    (function () {
      const brand = document.createElement('div');
      brand.className = 'kt-brand';
      brand.innerHTML = `
        <div class="kt-brand-icon">📡</div>
        <div>
          <div class="kt-brand-name">kt nasmedia</div>
          <div class="kt-brand-sub">SDK Docs</div>
        </div>`;

      function tagSdkSections() {
        const nav = document.querySelector('.sidebar-nav');
        if (!nav) return;
        nav.querySelectorAll('li').forEach(function (li) {
          const label = li.querySelector('p') || li.querySelector('strong');
          if (!label) return;
          const text = label.textContent.trim();
          if (text.includes('nap mx sdk')) li.classList.add('sdk-mx');
          else if (text.includes('nap tracking sdk')) li.classList.add('sdk-tracking');
        });
      }

      const obs = new MutationObserver(function () {
        const sb = document.querySelector('.sidebar');
        if (sb && !sb.querySelector('.kt-brand')) {
          sb.insertBefore(brand, sb.firstChild);
        }
        tagSdkSections();
      });
      obs.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
