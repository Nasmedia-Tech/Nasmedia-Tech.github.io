<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>KT Nasmedia SDK Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NAP SSP SDK · NAP Tracking SDK 공식 연동 가이드">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #1976D2;
      --sidebar-background: #f8f9fa;
      --sidebar-nav-link-color: #333;
      --sidebar-nav-link-color--active: #1976D2;
      --sidebar-nav-link-font-weight--active: 600;
      --base-font-size: 15px;
      --code-font-size: 13px;
    }
    .sidebar { border-right: 1px solid #e8e8e8; }
    .sidebar-nav li a { border-radius: 4px; transition: background 0.15s; }
    .sidebar-nav li a:hover { background: rgba(25,118,210,0.08); }
    .sidebar-nav .active > a { background: rgba(25,118,210,0.12); color: #1976D2; font-weight: 600; }
    h1, h2 { border-bottom: 1px solid #eee; padding-bottom: .3em; }
    .markdown-section code { background: #f3f4f6; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<b style="color:#1976D2">KT Nasmedia</b><br><small style="font-size:11px;color:#888">SDK Docs</small>',
      repo: '',
      loadSidebar: true,
      auto2top: true,
      subMaxLevel: 3,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '검색...',
        noData: '결과 없음',
        depth: 6,
      },
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      copyCode: { buttonText: '복사', errorText: '오류', successText: '완료!' },
      pagination: { previousText: '이전', nextText: '다음', crossChapter: true, crossChapterText: true },
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-kotlin.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-ruby.min.js"></script>
</body>
</html>
